services:
  postgres:
    image: postgres:16-alpine
    container_name: gamesave-postgres
    environment:
      POSTGRES_DB: gamesave
      POSTGRES_USER: player
      POSTGRES_PASSWORD: gamesave
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamesave-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U player -d gamesave" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: gamesave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - gamesave-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-init:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    depends_on:
      minio:
        condition: service_healthy
    restart: no
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
      mc mb myminio/game-saves --ignore-existing;
      mc anonymous set download myminio/game-saves;
      exit 0;
      "
    networks:
      - gamesave-network

networks:
  gamesave-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
